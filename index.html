<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boncuk Bulmacası</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#FBF3E8;--card:#FFFCF5;--border:#E8D4B8;--text:#3A2410;--muted:#A08060;--tab-active:#5B3218;--wood:#C8955A;--wood-dark:#8B5E3C;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);}
  header{background:var(--tab-active);padding:20px 20px 16px;text-align:center;}
  header h1{font-family:'Baloo 2',cursive;font-size:1.8rem;color:#FBF3E8;font-weight:800;}
  header p{color:#C4A882;font-size:0.85rem;margin-top:4px;}
  .tabs{display:flex;justify-content:center;gap:8px;padding:16px 16px 0;flex-wrap:wrap;}
  .tab-btn{font-family:'Baloo 2',cursive;font-weight:800;font-size:1rem;padding:9px 20px;border:none;border-radius:50px;cursor:pointer;background:#EAD9C0;color:#B09070;transition:all 0.2s;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
  .tab-btn.active{background:var(--tab-active);color:#FBF3E8;transform:translateY(-2px);box-shadow:0 6px 16px rgba(91,50,24,0.3);}
  .tab-content{display:none;padding:18px 14px 50px;}
  .tab-content.active{display:block;}
  .scenarios{display:flex;flex-direction:column;gap:14px;}
  .card{background:var(--card);border-radius:18px;border:1.5px solid var(--border);padding:16px 14px;box-shadow:0 3px 14px rgba(160,120,60,0.12);animation:fadeUp 0.35s ease both;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;}
  .card:active{transform:scale(0.98);}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  .card-title{font-family:'Baloo 2',cursive;font-size:0.78rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--wood-dark);margin-bottom:12px;}
  .puzzle-row{display:flex;align-items:center;justify-content:center;gap:8px;}
  .tower-box{display:flex;flex-direction:column;align-items:center;gap:4px;}
  .tower-label{font-size:0.65rem;font-weight:700;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;}
  .arrow-col{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:90px;}
  .arrow-symbol{font-size:1.5rem;color:var(--wood);line-height:1;}
  .step-pill{background:#F0E4D0;border-radius:20px;padding:3px 9px;font-size:0.68rem;font-weight:700;color:var(--tab-active);white-space:nowrap;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(30,15,5,0.82);align-items:center;justify-content:center;padding:24px;}
.modal-overlay.open{display:flex;}
.modal{background:var(–card);border-radius:28px;width:100%;max-width:360px;padding:28px 24px 24px;box-shadow:0 20px 60px rgba(0,0,0,0.4);position:relative;animation:popIn 0.25s cubic-bezier(0.34,1.56,0.64,1) both;}
@keyframes popIn{from{opacity:0;transform:scale(0.85);}to{opacity:1;transform:scale(1);}}
.modal-close{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:50%;border:none;background:#EAD9C0;color:var(–wood-dark);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:900;}
.modal-badge{display:inline-block;font-family:‘Baloo 2’,cursive;font-size:0.7rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(–wood-dark);background:#F0E4D0;border-radius:20px;padding:3px 12px;margin-bottom:10px;}
.modal-title{font-family:‘Baloo 2’,cursive;font-size:1.15rem;font-weight:800;color:var(–text);margin-bottom:18px;line-height:1.3;}
.modal-target-label{font-family:‘Baloo 2’,cursive;font-size:0.72rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(–muted);text-align:center;margin-bottom:10px;}
.modal-tower-wrap{display:flex;justify-content:center;background:#FBF3E8;border-radius:16px;padding:16px 10px 10px;margin-bottom:18px;border:1.5px solid var(–border);}
.modal-steps{margin-bottom:20px;}
.modal-steps-title{font-family:‘Baloo 2’,cursive;font-size:0.7rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(–muted);margin-bottom:8px;}
.modal-steps-list{display:flex;flex-direction:column;gap:5px;}
.modal-step{display:flex;align-items:center;gap:8px;background:#F0E4D0;border-radius:12px;padding:6px 12px;font-size:0.82rem;font-weight:700;color:var(–tab-active);}
.modal-step-num{width:20px;height:20px;border-radius:50%;background:var(–tab-active);color:#FBF3E8;font-size:0.65rem;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.download-btn{width:100%;padding:13px;border:none;border-radius:14px;background:var(–tab-active);color:#FBF3E8;font-family:‘Baloo 2’,cursive;font-size:1rem;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity 0.15s;}
.download-btn:active{opacity:0.8;}
.btn-row{display:flex;gap:10px;margin-top:0;}
.btn-schema{flex:1;padding:13px;border:none;border-radius:14px;background:#EAD9C0;color:var(–tab-active);font-family:‘Baloo 2’,cursive;font-size:1rem;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:opacity 0.15s;}
.btn-schema:active{opacity:0.7;}
/* SCHEMA MODAL */
.schema-overlay{display:none;position:fixed;inset:0;z-index:200;background:rgba(10,5,0,0.88);align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
.schema-overlay.open{display:flex;}
.schema-box{background:#fff;border-radius:6px;padding:16px;box-shadow:0 20px 60px rgba(0,0,0,0.5);display:flex;flex-direction:column;align-items:center;gap:12px;animation:popIn 0.2s ease both;max-width:340px;width:100%;margin:auto;position:relative;}
.schema-topbar{display:flex;justify-content:space-between;align-items:center;width:100%;margin-bottom:2px;}
.schema-modal-title{font-family:‘Baloo 2’,cursive;font-size:0.9rem;font-weight:800;color:#3A2410;}
.schema-close{width:30px;height:30px;border-radius:50%;border:none;background:#eee;color:#333;font-size:1rem;cursor:pointer;font-weight:900;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.schema-canvas-wrap{border:2px solid #222;border-radius:0;overflow:hidden;width:100%;}
.schema-canvas-wrap canvas{display:block;width:100%;height:auto;}
.print-tab-btn{background:#5B3218!important;color:#FBF3E8!important;}
/* PRINT PAGE */
#print-page{display:none;position:fixed;inset:0;z-index:300;background:#f0ece6;overflow-y:auto;}
.print-topbar{position:sticky;top:0;z-index:10;background:#5B3218;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.print-topbar h2{font-family:‘Baloo 2’,cursive;color:#FBF3E8;font-size:1.1rem;font-weight:800;}
.print-close{background:#EAD9C0;border:none;border-radius:20px;padding:6px 16px;font-family:‘Baloo 2’,cursive;font-weight:800;color:#5B3218;cursor:pointer;font-size:0.9rem;}
.print-body{padding:16px;display:flex;flex-direction:column;gap:24px;}
.print-start-section{background:#fff;border:2px solid #111;padding:16px;display:flex;flex-direction:column;align-items:center;gap:8px;}
.print-start-label{font-family:‘Baloo 2’,cursive;font-weight:800;font-size:1rem;color:#3A2410;letter-spacing:1px;}
.print-group{display:flex;flex-direction:column;gap:0;}
.print-group-title{font-family:‘Baloo 2’,cursive;font-weight:800;font-size:0.85rem;color:#5B3218;padding:8px 0 4px;letter-spacing:1px;text-transform:uppercase;}
.print-scenario-wrap{background:#fff;border:1.5px solid #222;display:flex;flex-direction:column;align-items:center;margin-bottom:12px;}
.print-scenario-wrap canvas{display:block;width:100%;height:auto;}
</style>

</head>
<body>
<header>
  <h1>🪵 Boncuk Bulmacası</h1>
  <p>Başlangıçtan hedefe kaç hamlede ulaşırsın?</p>
</header>
<div class="tabs">
  <button class="tab-btn active" onclick="showTab('t1',this)">1 Hamle</button>
  <button class="tab-btn" onclick="showTab('t2',this)">2 Hamle</button>
  <button class="tab-btn" onclick="showTab('t3',this)">3 Hamle</button>
  <button class="tab-btn" onclick="showTab('t4',this)">4 Hamle</button>
  <button class="tab-btn print-tab-btn" onclick="openPrintPage()">📋 Tüm Şemalar</button>
</div>
<div id="t1" class="tab-content active"></div>
<div id="t2" class="tab-content"></div>
<div id="t3" class="tab-content"></div>
<div id="t4" class="tab-content"></div>

<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal" id="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-badge" id="modal-badge"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-target-label">🎯 Hedef Durum</div>
    <div class="modal-tower-wrap"><div id="modal-tower"></div></div>
    <div class="modal-steps">
      <div class="modal-steps-title">Hamleler</div>
      <div class="modal-steps-list" id="modal-steps-list"></div>
    </div>
    <div class="btn-row">
      <button class="btn-schema" onclick="previewSchema()">👁 Şemayı Gör</button>
      <button class="download-btn" onclick="downloadImage()">⬇️ İndir</button>
    </div>
    <div class="btn-row" style="margin-top:8px;">
      <button class="btn-schema" onclick="previewFull()">👁 Tam Şema</button>
      <button class="download-btn" onclick="downloadFull()">⬇️ Tam İndir</button>
    </div>
    <div class="btn-row" style="margin-top:8px;">
      <button class="btn-schema" onclick="previewSteps()">👁 Adım Adım</button>
      <button class="download-btn" onclick="downloadSteps()">⬇️ Adım İndir</button>
    </div>
  </div>
</div>

<script>
/*
  Kapasite: Sol=3, Orta=2, Sağ=1
  Tüm senaryolar BFS ile hesaplandı — minimum hamle garantili.
  BAŞLANGIÇ: Sol:[B]  Orta:[Y]  Sağ:[R]
*/

const SCENARIOS = {
  1: [
    { label:"Mavi → Ortaya",    steps:["🔵 → Orta"], end:[[],['Y','B'],['R']]    },
    { label:"Sarı → Sola",      steps:["🟡 → Sol"],  end:[['B','Y'],[],['R']]    },
    { label:"Kırmızı → Sola",   steps:["🔴 → Sol"],  end:[['B','R'],['Y'],[]]    },
    { label:"Kırmızı → Ortaya", steps:["🔴 → Orta"], end:[['B'],['Y','R'],[]]    },
  ],
  // Not: "Mavi → Sağ" ve "Sarı → Sağ" yok çünkü sağ çubuk zaten dolu (R var, kapasite=1)
  2: [
    { label:"Mavi ortaya, Kırmızı sola",   steps:["🔵 → Orta","🔴 → Sol"],  end:[['R'],['Y','B'],[]]      },
    { label:"Sarı & Kırmızı sola (B-Y-R)", steps:["🟡 → Sol","🔴 → Sol"],   end:[['B','Y','R'],[],[]]     },
    { label:"Sarı sola, Kırmızı ortaya",   steps:["🟡 → Sol","🔴 → Orta"],  end:[['B','Y'],['R'],[]]      },
    { label:"Kırmızı & Sarı sola (B-R-Y)", steps:["🔴 → Sol","🟡 → Sol"],   end:[['B','R','Y'],[],[]]     },
    { label:"Kırmızı sola, Sarı sağa",     steps:["🔴 → Sol","🟡 → Sağ"],   end:[['B','R'],[],['Y']]      },
    { label:"Kırmızı ortaya, Mavi sağa",   steps:["🔴 → Orta","🔵 → Sağ"],  end:[[],['Y','R'],['B']]      },
  ],
  3: [
    { label:"Kırmızı & Mavi solda, Sarı ortada", steps:["🔵 → Orta","🔴 → Sol","🔵 → Sol"],  end:[['R','B'],['Y'],[]]   },
    { label:"Mavi & Kırmızı yer değiştirdi",     steps:["🔵 → Orta","🔴 → Sol","🔵 → Sağ"],  end:[['R'],['Y'],['B']]   },
    { label:"Mavi solda, Kırmızı & Sarı ortada", steps:["🟡 → Sol","🔴 → Orta","🟡 → Orta"], end:[['B'],['R','Y'],[]]   },
    { label:"Mavi solda, Kırmızı ortada, Sarı sağda", steps:["🟡 → Sol","🔴 → Orta","🟡 → Sağ"], end:[['B'],['R'],['Y']] },
  ],
  4: [
    { label:"Kırmızı-Mavi-Sarı solda",          steps:["🔵 → Orta","🔴 → Sol","🔵 → Sol","🟡 → Sol"],  end:[['R','B','Y'],[],[]]  },
    { label:"Kırmızı & Mavi solda, Sarı sağda", steps:["🔵 → Orta","🔴 → Sol","🔵 → Sol","🟡 → Sağ"],  end:[['R','B'],[],['Y']]   },
    { label:"Kırmızı & Sarı solda, Mavi sağda", steps:["🔵 → Orta","🔴 → Sol","🔵 → Sağ","🟡 → Sol"],  end:[['R','Y'],[],['B']]   },
    { label:"Sarı & Kırmızı ortada, Mavi sağda",steps:["🟡 → Sol","🔴 → Orta","🟡 → Orta","🔵 → Sağ"], end:[[],['R','Y'],['B']]   },
    { label:"Sarı sağda, Kırmızı & Mavi ortada",steps:["🟡 → Sol","🔴 → Orta","🟡 → Sağ","🔵 → Orta"], end:[[],['R','B'],['Y']]   },
  ]
};

// SVG tower — sağ çubuk kısa (kapasite=1), orta orta boy (kapasite=2), sol uzun (kapasite=3)
const BC={'B':{fill:'#3A7BD5',stroke:'#2A5BA5',shine:'#6AAAF0'},'Y':{fill:'#F0C030',stroke:'#C09010',shine:'#FAE070'},'R':{fill:'#E03030',stroke:'#B01010',shine:'#F06060'}};
const CAP_HEIGHTS = [74, 50, 26]; // rod heights: sol=3 boncuk, orta=2, sag=1

function towerSVG(c0,c1,c2, W=118, H=108){
  const bY=H-8, bH=12, rW=7, bR=13;
  const cols=[c0||[],c1||[],c2||[]];
  const xs=[22,59,96];
  let s=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  // Base
  s+=`<rect x="4" y="${bY-bH+2}" width="${W-8}" height="${bH}" rx="5" fill="#C8955A" stroke="#A07040" stroke-width="1.5"/>`;
  for(let ci=0;ci<3;ci++){
    const x=xs[ci], bs=cols[ci];
    const rH = CAP_HEIGHTS[ci];
    // Rod
    s+=`<rect x="${x-rW/2}" y="${bY-bH-rH+4}" width="${rW}" height="${rH}" rx="3.5" fill="#D4A060" stroke="#A07040" stroke-width="1"/>`;
    // Beads
    for(let bi=0;bi<bs.length;bi++){
      const c=BC[bs[bi]], cy=bY-bH-bR-1-bi*(bR*2+2);
      s+=`<circle cx="${x}" cy="${cy}" r="${bR}" fill="${c.fill}" stroke="${c.stroke}" stroke-width="1.5"/>`;
      s+=`<circle cx="${x-4}" cy="${cy-4}" r="4" fill="${c.shine}" opacity="0.5"/>`;
    }
  }
  return s+`</svg>`;
}

// Large SVG for modal (scaled up)
function towerSVGLarge(c0,c1,c2){
  const scale=1.9;
  const W=Math.round(118*scale), H=Math.round(108*scale);
  const bY=H-15, bH=Math.round(12*scale), rW=Math.round(7*scale), bR=Math.round(13*scale);
  const cols=[c0||[],c1||[],c2||[]];
  const xs=[Math.round(22*scale), Math.round(59*scale), Math.round(96*scale)];
  const capH = CAP_HEIGHTS.map(h=>Math.round(h*scale));
  let s=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  s+=`<rect x="6" y="${bY-bH+3}" width="${W-12}" height="${bH}" rx="8" fill="#C8955A" stroke="#A07040" stroke-width="2"/>`;
  for(let ci=0;ci<3;ci++){
    const x=xs[ci], bs=cols[ci], rH=capH[ci];
    s+=`<rect x="${x-rW/2}" y="${bY-bH-rH+5}" width="${rW}" height="${rH}" rx="5" fill="#D4A060" stroke="#A07040" stroke-width="1.5"/>`;
    for(let bi=0;bi<bs.length;bi++){
      const c=BC[bs[bi]], cy=bY-bH-bR-2-bi*(bR*2+3);
      s+=`<circle cx="${x}" cy="${cy}" r="${bR}" fill="${c.fill}" stroke="${c.stroke}" stroke-width="2"/>`;
      s+=`<circle cx="${x-6}" cy="${cy-6}" r="6" fill="${c.shine}" opacity="0.45"/>`;
    }
  }
  return s+`</svg>`;
}

const START=[['B'],['Y'],['R']];
let currentSC=null, currentTabN=1;

function renderTab(n){
  let html='<div class="scenarios">';
  SCENARIOS[n].forEach((sc,i)=>{
    html+=`<div class="card" style="animation-delay:${i*0.06}s" onclick="openModal(${n},${i})">
      <div class="card-title">${sc.label}</div>
      <div class="puzzle-row">
        <div class="tower-box"><div class="tower-label">Başlangıç</div>${towerSVG(...START)}</div>
        <div class="arrow-col"><div class="arrow-symbol">→</div>${sc.steps.map(s=>`<div class="step-pill">${s}</div>`).join('')}</div>
        <div class="tower-box"><div class="tower-label">Hedef</div>${towerSVG(...sc.end)}</div>
      </div></div>`;
  });
  document.getElementById('t'+n).innerHTML=html+'</div>';
}
[1,2,3,4].forEach(renderTab);

function openModal(n,i){
  const sc=SCENARIOS[n][i];
  currentSC=sc; currentTabN=n;
  document.getElementById('modal-badge').textContent=n+' Hamlelik Senaryo';
  document.getElementById('modal-title').textContent=sc.label;
  document.getElementById('modal-tower').innerHTML=towerSVGLarge(...sc.end);
  document.getElementById('modal-steps-list').innerHTML=sc.steps.map((s,i)=>
    `<div class="modal-step"><div class="modal-step-num">${i+1}</div>${s}</div>`).join('');
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow='';
}
function closeModalOutside(e){if(e.target===document.getElementById('modal'))closeModal();}

// Draws a schematic tower — flat colors, hollow rods, white base
function drawSchematicTower(ctx, c0, c1, c2, cx, cy, scale=1, whiteBase=false) {
  const cols = [c0||[], c1||[], c2||[]];
  const capH = [90, 58, 26]; // sol=3 boncuk, orta=2, sag=1 — orantılı
  const xs = [-38, 0, 38].map(x => cx + x*scale);
  const baseW = 108*scale, baseH = 11*scale;
  const rW = 5*scale, bR = 13*scale;

  // Base — sharp corners
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 1.8*scale;
  ctx.fillRect(cx - baseW/2, cy - baseH, baseW, baseH);
  ctx.strokeRect(cx - baseW/2, cy - baseH, baseW, baseH);

  for (let ci = 0; ci < 3; ci++) {
    const x = xs[ci];
    const rH = capH[ci] * scale;
    // Rod — sharp corners, hollow
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#111';
    ctx.lineWidth = 1.5*scale;
    ctx.fillRect(x - rW/2, cy - baseH - rH, rW, rH);
    ctx.strokeRect(x - rW/2, cy - baseH - rH, rW, rH);

    // Beads — flat fill, no shadow, no shine
    const colors = { 'B':'#3A7BD5', 'Y':'#F0C030', 'R':'#CC2020' };
    for (let bi = 0; bi < cols[ci].length; bi++) {
      const bead = cols[ci][bi];
      const bcy = cy - baseH - bR - 1 - bi*(bR*2 + 1*scale);
      ctx.fillStyle = colors[bead];
      ctx.beginPath(); ctx.arc(x, bcy, bR, 0, Math.PI*2); ctx.fill();
    }
  }
}

// Simulate moves step by step and return all intermediate states
function simulateSteps(sc){
  const CAPACITY = [3,2,1];
  const colNames = {'🔵 → Sol':0,'🔵 → Orta':1,'🔵 → Sağ':2,
                    '🟡 → Sol':0,'🟡 → Orta':1,'🟡 → Sağ':2,
                    '🔴 → Sol':0,'🔴 → Orta':1,'🔴 → Sağ':2};
  const beadOf   = {'🔵':'B','🟡':'Y','🔴':'R'};
  let state = [['B'],['Y'],['R']];
  const states = [state.map(c=>[...c])]; // start
  for(const step of sc.steps){
    const emoji = step.split(' ')[0];
    const bead  = beadOf[emoji];
    const ti    = colNames[step];
    state = state.map(c=>[...c]);
    // find which col has this bead on top
    for(let fi=0;fi<3;fi++){
      if(state[fi].length && state[fi][state[fi].length-1]===bead && fi!==ti){
        state[fi].pop();
        state[ti].push(bead);
        break;
      }
    }
    states.push(state.map(c=>[...c]));
  }
  return states;
}

function buildStepsCanvas(targetCanvas){
  const sc = currentSC; if(!sc) return null;
  const states = simulateSteps(sc);
  // Skip first state (başlangıç), only show states after each move
  const moveStates = states.slice(1);
  const N = moveStates.length;
  const S = 3;

  const W = 260;
  const outerPad = 10;
  const panelX = outerPad;
  const panelW = W - outerPad*2;

  // Panel: tower area + label below
  const towerAreaH = 180;
  const labelH = 26;
  const panelH = towerAreaH + labelH;
  // Divider line between panels
  const divH = 1;

  const H = outerPad + N * panelH + (N-1)*divH + outerPad;

  const canvas = targetCanvas || document.createElement('canvas');
  canvas.width = W*S; canvas.height = H*S;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.scale(S,S);

  // White bg
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);

  for(let i=0;i<N;i++){
    const state = moveStates[i];
    const panelY = outerPad + i*(panelH + divH);

    // Divider line between panels (not before first)
    if(i > 0){
      ctx.strokeStyle='#222'; ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(panelX, panelY);
      ctx.lineTo(panelX+panelW, panelY);
      ctx.stroke();
    }

    // Draw tower in upper part of panel
    const cx = W/2;
    const cy = panelY + towerAreaH - 14;
    drawSchematicTower(ctx, state[0], state[1], state[2], cx, cy, 1.0, true);

    // Label below tower area: "Hamle sayısı: X"
    const labelY = panelY + towerAreaH;
    ctx.fillStyle='#111';
    ctx.font='13px sans-serif';
    ctx.textAlign='center';
    // "Hamle sayısı: " normal, number bold
    const label1 = 'Hamle sayısı: ';
    const label2 = String(i+1);
    const w1 = ctx.measureText(label1).width;
    const w2Bold = 13; // approx bold width
    const totalW = w1 + w2Bold;
    const startX = W/2 - totalW/2;
    ctx.textAlign='left';
    ctx.font='13px sans-serif';
    ctx.fillText(label1, startX, labelY + 17);
    ctx.font='bold 13px sans-serif';
    ctx.fillText(label2, startX + w1, labelY + 17);
  }

  // Outer border
  ctx.strokeStyle='#111'; ctx.lineWidth=1.5;
  ctx.strokeRect(outerPad, outerPad, panelW, H - outerPad*2);

  ctx.restore();
  return canvas;
}

function previewSteps(){
  openSchemaModal('Adım Adım', buildStepsCanvas, downloadSteps);
}
function downloadSteps(){
  const sc = currentSC; if(!sc) return;
  const canvas = buildStepsCanvas();
  const link = document.createElement('a');
  link.download = `boncuk-adimlar-${sc.label.replace(/[^\w]/g,'-')}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function buildFullCanvas(targetCanvas){
  const sc = currentSC; if(!sc) return null;
  const S = 3;
  const W = 280, H = 500;
  const canvas = targetCanvas || document.createElement('canvas');
  canvas.width = W*S; canvas.height = H*S;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.scale(S,S);

  // White bg + outer border
  ctx.fillStyle = '#fff'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle = '#111'; ctx.lineWidth = 2;
  ctx.strokeRect(2,2,W-4,H-4);

  const panelW = W-24, panelX = 12, panelH = 190;

  // ── TOP: Başlangıç ──
  const topY = 12;
  ctx.strokeStyle='#111'; ctx.lineWidth=1.5;
  ctx.strokeRect(panelX, topY, panelW, panelH);
  ctx.fillStyle='#111'; ctx.font='bold 12px sans-serif'; ctx.textAlign='center';
  ctx.fillText('BAŞLANGIÇ', W/2, topY+16);
  drawSchematicTower(ctx, START[0], START[1], START[2], W/2, topY+panelH-12, 1.08, true);

  // ── DIVIDER ──
  const divY = topY+panelH+10;
  ctx.strokeStyle='#ccc'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(panelX+16,divY+11); ctx.lineTo(W/2-38,divY+11); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W/2+38,divY+11); ctx.lineTo(panelX+panelW-16,divY+11); ctx.stroke();
  ctx.fillStyle='#111'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
  ctx.fillText('Hamle sayısı : '+currentTabN, W/2, divY+15);

  // ── BOTTOM: Hedef ──
  const botY = divY+28;
  ctx.strokeStyle='#111'; ctx.lineWidth=1.5;
  ctx.strokeRect(panelX, botY, panelW, panelH);
  ctx.fillStyle='#111'; ctx.font='bold 12px sans-serif'; ctx.textAlign='center';
  ctx.fillText('HEDEF', W/2, botY+16);
  drawSchematicTower(ctx, sc.end[0], sc.end[1], sc.end[2], W/2, botY+panelH-12, 1.08, true);

  ctx.restore();
  return canvas;
}

function previewFull(){
  openSchemaModal('Başlangıç → Hedef', buildFullCanvas, downloadFull);
}
function downloadFull(){
  const sc = currentSC; if(!sc) return;
  const canvas = buildFullCanvas();
  const link = document.createElement('a');
  link.download = `boncuk-tam-${sc.label.replace(/[^\w]/g,'-')}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function buildSchemaCanvas(targetCanvas){
  const sc = currentSC; if(!sc) return null;
  const S = 3;
  const W = 280, H = 260;
  const canvas = targetCanvas || document.createElement('canvas');
  canvas.width = W*S; canvas.height = H*S;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.save();
  ctx.scale(S, S);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 2.5;
  ctx.strokeRect(3, 3, W-6, H-6);
  drawSchematicTower(ctx, sc.end[0], sc.end[1], sc.end[2], W/2, H - 30, 1.15, true);
  ctx.restore();
  return canvas;
}

let currentSchemaDownload = downloadImage;

function openSchemaModal(title, buildFn, dlFn){
  const canvas = document.getElementById('schema-canvas');
  buildFn(canvas);
  document.getElementById('schema-modal-title').textContent = title;
  currentSchemaDownload = dlFn;
  document.getElementById('schema-modal').classList.add('open');
  document.body.style.overflow='hidden';
}

function previewSchema(){
  openSchemaModal('Hedef Şeması', buildSchemaCanvas, downloadImage);
}
function closeSchema(){
  document.getElementById('schema-modal').classList.remove('open');
  document.body.style.overflow='';
}
function closeSchemaOutside(e){
  if(e.target===document.getElementById('schema-modal')) closeSchema();
}

function downloadImage(){
  const sc = currentSC; if(!sc) return;
  const canvas = buildSchemaCanvas();
  const link = document.createElement('a');
  link.download = `boncuk-hedef-${sc.label.replace(/[^\w]/g,'-')}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// ── PRINT PAGE ──────────────────────────────────────────────

function buildScenarioStepsCanvas(sc, tabN){
  // Same as buildStepsCanvas but for a given sc (not currentSC)
  const savedSC = currentSC, savedTabN = currentTabN;
  currentSC = sc; currentTabN = tabN;
  const canvas = buildStepsCanvas();
  currentSC = savedSC; currentTabN = savedTabN;
  return canvas;
}

function openPrintPage(){
  const body = document.getElementById('print-body');
  body.innerHTML = '';

  // ── START section ──
  const startSection = document.createElement('div');
  startSection.className = 'print-start-section';
  const startLabel = document.createElement('div');
  startLabel.className = 'print-start-label';
  startLabel.textContent = 'BAŞLANGIÇ DURUMU';
  startSection.appendChild(startLabel);

  // Draw start tower on canvas
  const startCanvas = document.createElement('canvas');
  const S=3, W=260, H=200;
  startCanvas.width=W*S; startCanvas.height=H*S;
  startCanvas.style.width='100%'; startCanvas.style.maxWidth='260px';
  const ctx=startCanvas.getContext('2d');
  ctx.scale(S,S);
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
  drawSchematicTower(ctx, START[0], START[1], START[2], W/2, H-14, 1.05, true);
  startSection.appendChild(startCanvas);
  body.appendChild(startSection);

  // ── Groups ──
  [1,2,3,4].forEach(n => {
    const groupDiv = document.createElement('div');
    groupDiv.className = 'print-group';

    const title = document.createElement('div');
    title.className = 'print-group-title';
    title.textContent = n + ' Hamlelik Senaryolar';
    groupDiv.appendChild(title);

    SCENARIOS[n].forEach(sc => {
      const wrap = document.createElement('div');
      wrap.className = 'print-scenario-wrap';

      // Build steps canvas for this scenario
      const savedSC = currentSC, savedTabN = currentTabN;
      currentSC = sc; currentTabN = n;
      const canvas = buildStepsCanvas();
      currentSC = savedSC; currentTabN = savedTabN;

      canvas.style.width = '100%';
      canvas.style.height = 'auto';
      wrap.appendChild(canvas);
      groupDiv.appendChild(wrap);
    });

    body.appendChild(groupDiv);
  });

  document.getElementById('print-page').style.display = 'block';
  document.body.style.overflow = 'hidden';
}

function closePrintPage(){
  document.getElementById('print-page').style.display = 'none';
  document.body.style.overflow = '';
}

function showTab(id,btn){
  document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(e=>e.classList.remove('active'));
  document.getElementById(id).classList.add('active'); btn.classList.add('active');
}
</script>
