<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boncuk Bulmacası</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#FBF3E8;--card:#FFFCF5;--border:#E8D4B8;--text:#3A2410;--muted:#A08060;--tab-active:#5B3218;--wood:#C8955A;--wood-dark:#8B5E3C;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);}
  header{background:var(--tab-active);padding:20px 20px 16px;text-align:center;}
  header h1{font-family:'Baloo 2',cursive;font-size:1.8rem;color:#FBF3E8;font-weight:800;}
  header p{color:#C4A882;font-size:0.85rem;margin-top:4px;}
  .tabs{display:flex;justify-content:center;gap:8px;padding:16px 16px 0;}
  .tab-btn{font-family:'Baloo 2',cursive;font-weight:800;font-size:1rem;padding:9px 20px;border:none;border-radius:50px;cursor:pointer;background:#EAD9C0;color:#B09070;transition:all 0.2s;box-shadow:0 2px 8px rgba(0,0,0,0.08);}
  .tab-btn.active{background:var(--tab-active);color:#FBF3E8;transform:translateY(-2px);box-shadow:0 6px 16px rgba(91,50,24,0.3);}
  .tab-content{display:none;padding:18px 14px 50px;}
  .tab-content.active{display:block;}
  .scenarios{display:flex;flex-direction:column;gap:14px;}
  .card{background:var(--card);border-radius:18px;border:1.5px solid var(--border);padding:16px 14px;box-shadow:0 3px 14px rgba(160,120,60,0.12);animation:fadeUp 0.35s ease both;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;}
  .card:active{transform:scale(0.98);}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
  .card-title{font-family:'Baloo 2',cursive;font-size:0.78rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:var(--wood-dark);margin-bottom:12px;}
  .puzzle-row{display:flex;align-items:center;justify-content:center;gap:8px;}
  .tower-box{display:flex;flex-direction:column;align-items:center;gap:4px;}
  .tower-label{font-size:0.65rem;font-weight:700;color:var(--muted);letter-spacing:0.5px;text-transform:uppercase;}
  .arrow-col{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:90px;}
  .arrow-symbol{font-size:1.5rem;color:var(--wood);line-height:1;}
  .step-pill{background:#F0E4D0;border-radius:20px;padding:3px 9px;font-size:0.68rem;font-weight:700;color:var(--tab-active);white-space:nowrap;}

  /* MODAL */
  .modal-overlay{
    display:none;position:fixed;inset:0;z-index:100;
    background:rgba(30,15,5,0.82);
    align-items:center;justify-content:center;
    padding:24px;
  }
  .modal-overlay.open{display:flex;}
  .modal{
    background:var(--card);border-radius:28px;
    width:100%;max-width:360px;
    padding:28px 24px 24px;
    box-shadow:0 20px 60px rgba(0,0,0,0.4);
    animation:popIn 0.25s cubic-bezier(0.34,1.56,0.64,1) both;
    position:relative;
  }
  @keyframes popIn{from{opacity:0;transform:scale(0.85);}to{opacity:1;transform:scale(1);}}

  .modal-close{
    position:absolute;top:14px;right:14px;
    width:32px;height:32px;border-radius:50%;
    border:none;background:#EAD9C0;color:var(--wood-dark);
    font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
    font-weight:900;line-height:1;
  }
  .modal-badge{
    display:inline-block;
    font-family:'Baloo 2',cursive;font-size:0.7rem;font-weight:800;
    letter-spacing:1.5px;text-transform:uppercase;
    color:var(--wood-dark);background:#F0E4D0;
    border-radius:20px;padding:3px 12px;margin-bottom:10px;
  }
  .modal-title{
    font-family:'Baloo 2',cursive;font-size:1.15rem;font-weight:800;
    color:var(--text);margin-bottom:18px;line-height:1.3;
  }
  .modal-target-label{
    font-family:'Baloo 2',cursive;font-size:0.72rem;font-weight:800;
    letter-spacing:2px;text-transform:uppercase;color:var(--muted);
    text-align:center;margin-bottom:10px;
  }
  .modal-tower-wrap{
    display:flex;justify-content:center;
    background:#FBF3E8;border-radius:16px;padding:16px 10px 10px;
    margin-bottom:18px;
    border:1.5px solid var(--border);
  }
  .modal-steps{margin-bottom:20px;}
  .modal-steps-title{
    font-family:'Baloo 2',cursive;font-size:0.7rem;font-weight:800;
    letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);
    margin-bottom:8px;
  }
  .modal-steps-list{display:flex;flex-direction:column;gap:5px;}
  .modal-step{
    display:flex;align-items:center;gap:8px;
    background:#F0E4D0;border-radius:12px;padding:6px 12px;
    font-size:0.82rem;font-weight:700;color:var(--tab-active);
  }
  .modal-step-num{
    width:20px;height:20px;border-radius:50%;
    background:var(--tab-active);color:#FBF3E8;
    font-size:0.65rem;font-weight:900;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  .download-btn{
    width:100%;padding:13px;border:none;border-radius:14px;
    background:var(--tab-active);color:#FBF3E8;
    font-family:'Baloo 2',cursive;font-size:1rem;font-weight:800;
    cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;
    transition:opacity 0.15s;
  }
  .download-btn:active{opacity:0.8;}
</style>
</head>
<body>
<header>
  <h1>🪵 Boncuk Bulmacası</h1>
  <p>Başlangıçtan hedefe kaç hamlede ulaşırsın?</p>
</header>
<div class="tabs">
  <button class="tab-btn active" onclick="showTab('t1',this)">1 Hamle</button>
  <button class="tab-btn" onclick="showTab('t2',this)">2 Hamle</button>
  <button class="tab-btn" onclick="showTab('t3',this)">3 Hamle</button>
  <button class="tab-btn" onclick="showTab('t4',this)">4 Hamle</button>
</div>
<div id="t1" class="tab-content active"></div>
<div id="t2" class="tab-content"></div>
<div id="t3" class="tab-content"></div>
<div id="t4" class="tab-content"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="closeModalOutside(event)">
  <div class="modal" id="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-badge" id="modal-badge"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-target-label">🎯 Hedef Durum</div>
    <div class="modal-tower-wrap">
      <div id="modal-tower"></div>
    </div>
    <div class="modal-steps">
      <div class="modal-steps-title">Hamleler</div>
      <div class="modal-steps-list" id="modal-steps-list"></div>
    </div>
    <button class="download-btn" onclick="downloadImage()">⬇️ Hedef Görseli İndir</button>
  </div>
</div>

<script>
const SCENARIOS = {
  1: [
    { label:"Mavi → Ortaya",    steps:["🔵 → Orta"], end:[[],['Y','B'],['R']]   },
    { label:"Mavi → Sağa",      steps:["🔵 → Sağ"],  end:[[],['Y'],['R','B']]   },
    { label:"Sarı → Sola",      steps:["🟡 → Sol"],  end:[['B','Y'],[],['R']]   },
    { label:"Sarı → Sağa",      steps:["🟡 → Sağ"],  end:[['B'],[],['R','Y']]   },
    { label:"Kırmızı → Sola",   steps:["🔴 → Sol"],  end:[['B','R'],['Y'],[]]   },
    { label:"Kırmızı → Ortaya", steps:["🔴 → Orta"], end:[['B'],['Y','R'],[]]   },
  ],
  2: [
    { label:"Mavi ortaya, Kırmızı sola",  steps:["🔵 → Orta","🔴 → Sol"],  end:[['R'],['Y','B'],[]]       },
    { label:"Hepsi ortada",               steps:["🔵 → Orta","🔴 → Orta"], end:[[],['Y','B','R'],[]]      },
    { label:"Mavi sağa, Sarı sola",       steps:["🔵 → Sağ","🟡 → Sol"],   end:[['Y'],[],['R','B']]       },
    { label:"Hepsi sağda (R-B-Y)",        steps:["🔵 → Sağ","🟡 → Sağ"],   end:[[],[],['R','B','Y']]      },
    { label:"Hepsi solda (B-Y-R)",        steps:["🟡 → Sol","🔴 → Sol"],   end:[['B','Y','R'],[],[]]       },
    { label:"Hepsi sağda (R-Y-B)",        steps:["🟡 → Sağ","🔵 → Sağ"],   end:[[],[],['R','Y','B']]      },
  ],
  3: [
    { label:"Kırmızı & Mavi solda, Sarı ortada",      steps:["🔵 → Orta","🔴 → Sol","🔵 → Sol"],  end:[['R','B'],['Y'],[]]    },
    { label:"Mavi & Kırmızı yer değiştirdi",          steps:["🔵 → Orta","🔴 → Sol","🔵 → Sağ"],  end:[['R'],['Y'],['B']]    },
    { label:"Sarı & Mavi solda, Kırmızı sağda",       steps:["🔵 → Sağ","🟡 → Sol","🔵 → Sol"],   end:[['Y','B'],[],['R']]   },
    { label:"Sarı solda, Mavi ortada",                 steps:["🔵 → Sağ","🟡 → Sol","🔵 → Orta"],  end:[['Y'],['B'],['R']]    },
    { label:"Mavi solda, Kırmızı & Sarı ortada",      steps:["🟡 → Sol","🔴 → Orta","🟡 → Orta"], end:[['B'],['R','Y'],[]]   },
    { label:"Mavi solda, Kırmızı ortada, Sarı sağda", steps:["🟡 → Sol","🔴 → Orta","🟡 → Sağ"],  end:[['B'],['R'],['Y']]    },
  ],
  4: [
    { label:"Kırmızı-Mavi-Sarı solda",          steps:["🔵 → Orta","🔴 → Sol","🔵 → Sol","🟡 → Sol"],  end:[['R','B','Y'],[],[]]   },
    { label:"Kırmızı & Mavi solda, Sarı sağda", steps:["🔵 → Orta","🔴 → Sol","🔵 → Sol","🟡 → Sağ"],  end:[['R','B'],[],['Y']]    },
    { label:"Kırmızı & Sarı solda, Mavi sağda", steps:["🔵 → Orta","🔴 → Sol","🔵 → Sağ","🟡 → Sol"],  end:[['R','Y'],[],['B']]    },
    { label:"Kırmızı sola, Mavi & Sarı sağda",  steps:["🔵 → Orta","🔴 → Sol","🔵 → Sağ","🟡 → Sağ"],  end:[['R'],[],['B','Y']]    },
    { label:"Sarı-Mavi-Kırmızı solda",          steps:["🔵 → Sağ","🟡 → Sol","🔵 → Sol","🔴 → Sol"],   end:[['Y','B','R'],[],[]]   },
    { label:"Sarı & Kırmızı solda, Mavi ortada",steps:["🔵 → Sağ","🟡 → Sol","🔵 → Orta","🔴 → Sol"],  end:[['Y','R'],['B'],[]]    },
  ]
};

const BC={'B':{fill:'#3A7BD5',stroke:'#2A5BA5',shine:'#6AAAF0'},'Y':{fill:'#F0C030',stroke:'#C09010',shine:'#FAE070'},'R':{fill:'#E03030',stroke:'#B01010',shine:'#F06060'}};

function towerSVG(c0,c1,c2, W=118, H=108){
  const bY=H-8,bH=12,rW=7,rH=74,bR=13,cols=[c0||[],c1||[],c2||[]],xs=[22,59,96];
  let s=`<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  s+=`<rect x="4" y="${bY-bH+2}" width="${W-8}" height="${bH}" rx="5" fill="#C8955A" stroke="#A07040" stroke-width="1.5"/>`;
  for(let ci=0;ci<3;ci++){
    const x=xs[ci],bs=cols[ci];
    s+=`<rect x="${x-rW/2}" y="${bY-bH-rH+4}" width="${rW}" height="${rH}" rx="3.5" fill="#D4A060" stroke="#A07040" stroke-width="1"/>`;
    for(let bi=0;bi<bs.length;bi++){const c=BC[bs[bi]],cy=bY-bH-bR-1-bi*(bR*2+2);s+=`<circle cx="${x}" cy="${cy}" r="${bR}" fill="${c.fill}" stroke="${c.stroke}" stroke-width="1.5"/><circle cx="${x-4}" cy="${cy-4}" r="4" fill="${c.shine}" opacity="0.5"/>`;}
  }
  return s+`</svg>`;
}

const START=[['B'],['Y'],['R']];
let currentSC = null;
let currentTabN = 1;

function renderTab(n){
  let html='<div class="scenarios">';
  SCENARIOS[n].forEach((sc,i)=>{
    html+=`<div class="card" style="animation-delay:${i*0.06}s" onclick="openModal(${n},${i})">
      <div class="card-title">${sc.label}</div>
      <div class="puzzle-row">
        <div class="tower-box"><div class="tower-label">Başlangıç</div>${towerSVG(...START)}</div>
        <div class="arrow-col"><div class="arrow-symbol">→</div>${sc.steps.map(s=>`<div class="step-pill">${s}</div>`).join('')}</div>
        <div class="tower-box"><div class="tower-label">Hedef</div>${towerSVG(...sc.end)}</div>
      </div></div>`;
  });
  document.getElementById('t'+n).innerHTML=html+'</div>';
}
[1,2,3,4].forEach(renderTab);

function openModal(n, i){
  const sc = SCENARIOS[n][i];
  currentSC = sc;
  currentTabN = n;

  document.getElementById('modal-badge').textContent = n + ' Hamlelik Senaryo';
  document.getElementById('modal-title').textContent = sc.label;

  // Large tower SVG
  document.getElementById('modal-tower').innerHTML = towerSVG(...sc.end, 220, 200);

  // Steps
  document.getElementById('modal-steps-list').innerHTML = sc.steps.map((s,i)=>
    `<div class="modal-step"><div class="modal-step-num">${i+1}</div>${s}</div>`
  ).join('');

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow='';
}

function closeModalOutside(e){
  if(e.target === document.getElementById('modal')) closeModal();
}

function downloadImage(){
  const sc = currentSC;
  if(!sc) return;

  // Draw to canvas
  const canvas = document.createElement('canvas');
  const scale = 2;
  const W = 400, H = 500;
  canvas.width = W * scale;
  canvas.height = H * scale;
  const ctx = canvas.getContext('2d');
  ctx.scale(scale, scale);

  // Background
  ctx.fillStyle = '#FBF3E8';
  ctx.fillRect(0,0,W,H);

  // Header bar
  ctx.fillStyle = '#5B3218';
  ctx.beginPath();
  ctx.roundRect(0,0,W,70,0);
  ctx.fill();

  // Header text
  ctx.fillStyle = '#FBF3E8';
  ctx.font = 'bold 22px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('🪵 Boncuk Bulmacası', W/2, 30);
  ctx.font = '13px sans-serif';
  ctx.fillStyle = '#C4A882';
  ctx.fillText(currentTabN + ' Hamlelik Senaryo', W/2, 52);

  // Title
  ctx.fillStyle = '#3A2410';
  ctx.font = 'bold 18px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(sc.label, W/2, 105);

  // "Hedef Durum" label
  ctx.fillStyle = '#A08060';
  ctx.font = 'bold 12px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('🎯  HEDEF DURUM', W/2, 135);

  // Draw tower on canvas using SVG→Image
  const svgStr = towerSVG(...sc.end, 260, 240);
  const svgBlob = new Blob([svgStr], {type:'image/svg+xml'});
  const url = URL.createObjectURL(svgBlob);
  const img = new Image();
  img.onload = function(){
    ctx.drawImage(img, (W-260)/2, 148, 260, 240);
    URL.revokeObjectURL(url);

    // Steps section
    ctx.fillStyle = '#8B5E3C';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('HAMLELER', 30, 415);

    sc.steps.forEach((step, idx) => {
      const y = 435 + idx * 26;
      // pill bg
      ctx.fillStyle = '#F0E4D0';
      ctx.beginPath();
      ctx.roundRect(30, y-16, 340, 22, 11);
      ctx.fill();
      // number circle
      ctx.fillStyle = '#5B3218';
      ctx.beginPath();
      ctx.arc(48, y-5, 9, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#FBF3E8';
      ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(idx+1, 48, y-1);
      // step text
      ctx.fillStyle = '#3A2410';
      ctx.font = 'bold 13px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(step, 65, y-1);
    });

    // Download
    const link = document.createElement('a');
    link.download = `boncuk-hedef-${sc.label.replace(/[^a-zA-Z0-9ğüşıöçĞÜŞİÖÇ]/g,'-')}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  };
  img.src = url;
}

function showTab(id,btn){
  document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(e=>e.classList.remove('active'));
  document.getElementById(id).classList.add('active');btn.classList.add('active');
}
</script>
</body>
</html>
